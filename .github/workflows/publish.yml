      - name: Upload publish result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-result-${{ matrix.language }}-ext-library-sources
          path: publish-results/${{ matrix.language }}-ext-library-sources.json
          retention-days: 1

  summary:
    name: Publish summary
    needs: [queries, library, extensions, library_sources_extensions]
    if: always()
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Download publish results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: publish-result-*
          path: publish-results
          merge-multiple: true

      - name: Build summary table
        run: |
          mkdir -p publish-results
          echo "Result fragments found:"
          ls -la publish-results
          .github/scripts/build-publish-summary.sh publish-results > summary.md
          echo "summary.md is $(wc -l < summary.md) lines, $(wc -c < summary.md) bytes"
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build CodeQL library versions table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/build-codeql-lib-versions-table.sh > codeql-lib-versions.md
          cat codeql-lib-versions.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert release table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/upsert-release-table.sh summary.md publish-summary
          .github/scripts/upsert-release-table.sh codeql-lib-versions.md codeql-lib-versions
