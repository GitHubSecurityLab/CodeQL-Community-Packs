          elif [ "${{ steps.check_version.outputs.publish }}" == "true" ]; then
            if [ "${{ steps.publish.outcome }}" == "success" ]; then
              STATUS="published"
            else
              STATUS="failed"
            fi
          fi
          jq -n \
            --arg language "${{ matrix.language }}" \
