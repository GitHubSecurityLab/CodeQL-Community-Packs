name: Publish CodeQL Packs

# Auto-publish only fires when .release.yml itself changes - that's the
# deliberate "cut a release" signal (see update-release.yml, which bumps
# .release.yml and every pack version together in one PR). Individual pack
# version bumps merged outside of that flow do NOT auto-publish; use
# workflow_dispatch for one-off hotfixes (see CONTRIBUTING.md).
on:
  push:
    branches: [main]
    paths:
      - ".release.yml"
  workflow_dispatch:


jobs:
  queries:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        language: ["cpp", "csharp", "go", "java", "javascript", "python", "ruby"] 

    steps:
      - uses: actions/checkout@v7

      - name: Check codeql-LANG-queries (src) pack
        id: check_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBLISHED_VERSION=$(gh api /orgs/githubsecuritylab/packages/container/codeql-${{ matrix.language }}-queries/versions --jq '.[0].metadata.container.tags[0]')
          CURRENT_VERSION=$(grep -E '^version:' ${{ matrix.language }}/src/qlpack.yml | head -1 | awk '{print $2}')

          echo "Published version: $PUBLISHED_VERSION"
          echo "Local version: $CURRENT_VERSION"

          echo "published_version=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [ "$PUBLISHED_VERSION" != "$CURRENT_VERSION" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup CodeQL
        if: steps.check_version.outputs.publish == 'true'
        uses: ./.github/actions/install-codeql

      - name: Publish codeql-LANG-queries (src) pack.
        id: publish
        if: steps.check_version.outputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing codeql-${{ matrix.language }}-queries."
          codeql pack install "${{ matrix.language }}/src"
          codeql pack publish "${{ matrix.language }}/src"

      - name: Record publish result
        if: always()
        run: |
          mkdir -p publish-results
          STATUS="up-to-date"
          if [ "${{ steps.check_version.outcome }}" != "success" ]; then
            STATUS="failed"
          elif [ "${{ steps.check_version.outputs.publish }}" == "true" ]; then
            if [ "${{ steps.publish.outcome }}" == "success" ]; then
              STATUS="published"
            else
              STATUS="failed"
            fi
          fi
          jq -n \
            --arg language "${{ matrix.language }}" \
            --arg type "src" \
            --arg package "codeql-${{ matrix.language }}-queries" \
            --arg previous_version "${{ steps.check_version.outputs.published_version }}" \
            --arg target_version "${{ steps.check_version.outputs.current_version }}" \
            --arg status "$STATUS" \
            '{language: $language, type: $type, package: $package, previous_version: $previous_version, target_version: $target_version, status: $status}' \
            > "publish-results/${{ matrix.language }}-src.json"

      - name: Upload publish result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-result-${{ matrix.language }}-src
          path: publish-results/${{ matrix.language }}-src.json
          retention-days: 1

  library:
